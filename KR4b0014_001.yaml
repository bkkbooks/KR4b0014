舊愛盡暌違望鄉空引領極目淚沾衣旅客長憔悴春物自芳菲岸花臨水發江燕繞檣飛無由下征帆獨與暮潮歸道中贈桓司馬季圭晨纜雖同解晚洲阻共入猶如征鳥飛差池不可及本願申羈旅何言異翔集君渡北江時詎今南浦泣春暮喜晴酬袁戶曹苦雨振衣喜初霽褰裳對晚晴落花猶未倦時鳥故餘聲春芳空悅目遊客反傷情鄉園不可見江水徒自清願得同擕手歸望對都城和蕭咨議岑離閨怨曉河沒高棟斜月半空庭窗中度落葉簾外隔飛螢含悲下翠帳掩泣閉金屏昔期今未返春草寒復青思君無轉易何異北辰星暮秋答朱記室遊揚日色淺騷屑風音徑寒潭見底清風色極天淨寸隂坐銷鑠千里長遼逈桃李爾繁華松柏余本性故心不存此高文徒可詠夕望江橋示蕭咨議楊建康江主簿夕鳥已西渡殘霞亦半銷風聲動密竹水影漾長橋旅人多憂思寒江復寂寥爾情深鞏洛豫念返漁樵何因適歸願分路一揚鑣詠早梅兔園標物序驚時最是梅銜霜當路發映雪擬寒開枝橫却月觀花繞凌風臺朝灑長門泣夕駐臨卭杯應知早飄落故逐上春來門有車馬客門有車馬客言是故鄉來故鄉有書信縱橫印檢開開書看未極行客屢相識借問故鄉來潺湲淚不息上言離别久下言望應歸寸心將夜鵠相逐向南飛離夜聽琴别離既有緒琴瑟返成悲美人多怨態亦復慘長眉詠春風可聞不可見能重復能輕鏡前飄落粉琴上響餘聲邊城思柳黃未吐葉水緑半含苔春色邊城動客思故鄉來昭君怨昔聞白鶴弄已自軫離情今來昭君曲還悲秋草生為人妾怨絶句燕戲還簷際花飛落枕前寸心悲不見拭淚坐調絃為人妾思二絶句魂銷形已去叉落猶依枕欲去淚無眥不看悲復甚又機中刺繡所窗下朝粧處未憶神已傷欲忘悲不去相送絶句客心已百念孤遊重千里江暗雨欲來浪白風初起閨怨絶句二首竹葉響南窗月光照東壁誰知夜獨覺枕前雙淚滴又閨閣行人斷房櫳月影斜誰知北窗下猶對後庭花苑中絶句苑門閉千扇苑户開萬扉樓殿聞珠履竹樹隔羅衣擬古三首家本青山下好上青山上青山不可上一上一惆悵右遜匣中一明鏡好鑒明鏡光明鏡不可鑒一鑒一情傷右雲少知雅琴曲好聽雅琴聲雅琴不可聽一聽一沾纓右孝綽往晉陵聯句臨别我傷悲送歸子自適劉金不可散卜蓋何由惜遜從來重分隂未曽輕尺璧故任情一異於是望三益髙爽爾自高樓寢豫返東臯陌寄語落毛人非復平原客遜問舍且求田音亂無可擇勝門成好事盤紆欲何索爽范廣州宅聯句洛陽城東西郤作經年别昔去雪如花今來花似雪雲濛濛夕煙起奄奄殘暉滅非君愛滿堂寧我安車轍遜相送聯句寸隂常可惜别至倍傷神豫瞻天際水子望路中塵韋黯憫憫岐路側去去平生親一朝事千里流涕向三春遜又昔共入門笑今成送别悲君還舊聚處為我一嚬眉王江乘於今還促膝自此客江湄願子俱停駕看我獨解維遜慈母磯暮煙起遙岸斜日照安流一同心賞夕暫解去鄉憂野岸平沙合連山逺霧浮客悲不自已江上望歸舟至大雷聯句高談良會夕滿酒對羈情閔閔風煙動蕭蕭江雨聲遜密雲窮浦暗飛電逺洲明若非今宴適詎使客愁輕劉孺遙舟似連鴈逺火若回星江潭望如此銜巵共君傾桓季圭賦咏聯句弊履常決踵眉高起半額曼倩爾何為獨嘆長安索遜工商既慚巧農仕聊相易蝘腹有餘資鴻肩方可拍江革攝職愧握蘭濫官悲執戟連章既不敏高談豈能劇孺逸翮任奮飛窘步事羈勒還鳥余能繫流言爾無惑革憂懷乃千載永歡常數刻直是悲别離非關念通塞遜日照汀沙素山影波浪黑爾限大江南余歸茂陵北孺臨别聨句臨别情多緒送歸涕如霰君望長安城豫悲獨不見遜爾來同去國豫歸方異縣懷别心獨憂手淚方濺濺孺贈新曲相對聯句酒闌日隱樹上客請調絃嬌人挾瑟至逶迤未肯前劉孝勝舊愛今何在新聲徒自憐有曲無人聽徙倚高樓前何澄徘徊映日照轉側被風吹徒為相思響傷春君不知劉綺月昏樓上坐含悲望别離已切空牀怨復看花柳枝遜照水聯句插花行理鬢遷延去復歸雖憐水上影復恐濕羅衣遜臨橋看黛色映渚媚鉛暉不顧春荷動彌畏小禽飛綺折花聯句笑出春園裏望花聯褰纈欲以間珠鈿非為相思折遜日照爛成綺風來聚疑雪試采一枝歸願持因逺别綺搖扇聯句紈扇已新製蕩婦復新粧欲掩羞中笑還飄袖裏香遜在握時搖動當歌掩抑揚誰云減羅袂影日聊自障綺正叉聯句竹臺歸欲礙花林出未通度簮先分影轉珥忽瞻風遜雙橋耀寶鈿闐闐密復叢羞令桂纓闕整插補餘空綺右春明宋氏遜集舊本八卷特完因借録之遜秀句殊多如九日侍宴云疏樹翻高葉寒流聚細文日斜迢遞宇風起嵯峨雲答高博士云幽蝶弄晚花清池映疏竹還渡五洲云蕭散煙霞晚凄清江漢秋答庾郎云蛺蝶縈空戲日暮望江云水影漾長橋贈崔録事云河流繞岸清川平看鳥逺送行云江暗雨欲來浪白風初起庾子山輩有所不逮如早梅云枝橫却月觀花繞凌風臺銅雀妓云曲中相顧起日暮松柏聲句殊雄古而顔黃門謂其每病辛苦饒貧寒氣無乃太貶乎少陵嘗引昏鴉接翅歸金粟裹搔頭等語而此集無有猶當有軼者集中若團團月隱洲輕燕逐風花野岸平沙合連山逺霧浮岸花臨水發江燕繞檣飛遊魚上急瀨薄雲巖際宿等語子美皆采為己句但小異耳故曰能詩何水曹信非虛賞武陽黃伯思長睿跋七召八首假氏先生負兹徑挺狀羣飛之喪侣似獨行之捷徑神忽忽而若忘意衝衝而不定監丹緑其無主聞鐘鼓以失聽至乃冬霰積庭室靡人聲春花滿野地無行者圜堵常閉曲突無煙同生芻之有束共死灰之曀然篤論公子聞而崛起雖道術之可忘亦切磋之可恥命徒御以絡繹將有事乎巖中車焴爚而流水馬泮渙以追風乃踰汗漫入朦朧至深潭之澳溟有洞室之穹崇居隱磷而出沒望嶔岑而下上竹巨石以袤通水韻松而合響地不寒而蕭瑟月無雲而曭朗於是整容投刺屣履排門揚眉就席舉袂而言曰若五秀稟其生靈六情通其愛惡憎共集於鄙老嗜同歸於美樂今足下羣鳥獸以為娛處貧賤而不怍欲賔實於孤介乃貽譏於隕穫至乃􅵥􅵥死於道邊貿貿填於溝壑削松筆以畫虎鼓鉛刀而刻鵠身既勞而不倦事可感而莫懲欲模名而帶索豈知命於泥繩何異走長衢而避影煎流水以求氷今欲導足下以衛生之祕術怡神之妙道譬愈我於沉痾若起尸於仙草寧願聞乎先生曰有為之生已逼無益之慮常勞若見明於凝滯幸求教於肓膏宫室公子曰千門始構百洞常啓激渚開渠疏山抗址延袤水陸廣望東西下臨江海上屬雲霓百丈杳冥以飛跨九層鬱律以階梯步三休而未半塗中宿而方迷雕牆屈曲以交牙網户周流以重積既隂岑而影響亦呌嘯而回易沙版金鋪紫柱玉舄煒煌熻赩硱磳摶敝圗雲霧之蔽虧壯神仙之來往璧璫自耀珠綴嘗響蜉蝣動而晝喧熠耀飛而夜朗既臨下以漻泬亦憑高而泱漭聞疾雷於階丫弄奔星於帷幌亘以曲堂周以洞房北負連闥南注長廊綺疏交映漏檻相望燕飛蓮井日照杏梁陽烏騫其將動雲鳳矯而欲翔若乃凌沼開源延石崇壤疑昆閬之鬱岪侔滄溟之瀇漾其中别有桂宫柏寢吳臺柘館復道耿介而連雲阿閣穹窿而仰漢望虬欄之映水見丹鶴之出岸艷草竒色嘉樹珍名長生靈壽男華女貞河柳垂葉山榴發英玩竒花之春滿摘甘實於夏成此實宫苑之壯麗豈能從我而為榮先生曰多言返道辨口傷實懼貽敝於蔀家且自求乎容膝肴饌公子曰銅鉼玉井金釜桂薪六彞九鼎百果千珍熊蹯虎掌雞跖猩唇潛魚兩味立犀五肉拾卵鳳巢剖胎豹腹三臠甘口七葅愜目蒸餅十字湯官五熟海椒魯豉河鹽蜀薑劑水火而和調糅蘇蔱以芬芳脯追復而不盡犢稍割而無傷黿羮流啜蜒醬先嘗鱠溫湖之美鮒切丙穴之嘉魴落爼霞散逐刃雪揚輕同曵繭白似飛霜蔗有盈丈之名桃表兼斤之實杏積魏國之貢菱為巨野所出衡曲黃梨汶垂蒼栗隴西白奈湘南朱橘荔枝沙棠蒲萄石蜜瓜稱素腕之美棗有細腰之質並抗吻以除煩永咀牙而消疾於是三雅陳席百味開印玉璣星稀蘭英縹潤既夷志於坎壈亦忘懷於鄙吝此蓋滋旨之極珍豈從余而並進先生曰不貴偷食豈甘醇酒既深悟於腐腸豈自迷於爽口聲色公子曰秦氏獨立燕姬絶世如短如長不穠不細信耳目之珍冶乃古今之佳麗妍姿艷逸淑性間華效施朱於宋里結墮馬於梁家相纎腰以微步呈皓腕於輕紗臨池正領拂鏡看花觀堵墻以颯沓傾城國以喧譁墨欲歸而抽軫惠將返而回車至乃鄭衛繁聲抑揚絶調定使風雲變動性靈感召擊哀響則春臺之人愴然而雪泣起歡情則崩城之婦粲然而微笑嶰谷調鳳之管龍門獨鵠之柯緑珠絳樹宋臘韓娥青春婉娩上客經過開洞房以命賞召人才而合宴舉輕幔以徐來隔珠簾而可見牀披象簟戶垂羅薦聽促柱之方遒聞度聲之始囀郤想象以頓足腕蹁蹮而拂面託斜視於遺簮寄含情而舉扇俄而夕鶩來返落日西懸綺霞映水蛾月生天解鴛鴦之繡被拂蛩蚷之長氊燭中帷而動爛香出帳而微煙願橫施以自昵脫斜領於君前此乃聲色之妖蕩將不從我而流連先生曰淫聲非篤論之旨麗色乃余情所棄伐國不問仁人此言何從而至佃遊公子曰嵗晚農收時間務隙山火已燎野霜初白聊效殺於秋冬將從禽於草澤蜀地五丁齊都二子氣動山漂汗揮雨起渥窪流頳護蘭泄血躡飛影於未形奔流星於欲滅革車隱隱轂騎闐闐鼓噪喧而振地蒸徒駭而䀨天割玉之刀飲石之箭罝羅布其一目罟網周其三面犬號􅋮螭鷹名奔電暫離已合忽隱仍見赴逈趨危衝林跋險草隨足起山從眼轉跨躡溪澗電舉陵阪鳥不及飛獸不遑伏既前躙而後掎亦左排而右蹴跖實駭而自救騰靈亂而相撲視灑血之丹地見飛毛之暗目傍窮劫欹勢極搜求文皮坐裂膬尾生抽手羈鐡頂足批銅頭象折齒而陵遽貊拉幽而夷猶擒高樓之度索走大樹之神牛鴈聞弦而跕墮猿抱木而啾啁笑楚王之雲夢恥漢帝之中流此武才之趫猛豈能從我而佃遊先生曰馳騁傷仁好殺非勇幸內教之豐樂何禽荒之足重神仙公子曰跋烏始照宫槐遽而欲舒顧裁滿庭英紛而就落譬光景於飛浮比生靈於棲托擾擾摩肩轔轔方駕空怵迫於毁譽獨殷勤於用捨嗟向有而今無歎後榮而前謝清歌雅舞暫同於夢寐廣厦高堂俄成於幻化若夫洗精服食慕道遊仙尋玉塵於萬里守金竈於千年三尸可度九轉難傳飛騰水陸咀嚼靈玄若乃壁上真詞枕中祕要彈射鬼神吐納靈妙既變醜以成妍亦反老而為少虬駕夭矯而出沒霓裳颯沓而容與接鶴馭於後乘追鳳簫於前侣雨散漂以沾服雲霏微而襲豫瞰芝闕以窈窕見玉臺之相拒蓋排煙而漸滅旌拖風而未舉值解珮於江濵逢弄珠於湘渚薄遊玄圃弭節泰華列神童於羽帳倚玉女於仙車澗采兮危實苑拔兮回花聽弱水之晨浪望崑山之夕霞窮北辰而比壽指中嶽以為家此神仙之恍惚豈從我而蠲邪先生曰捕影之言莫測繫風之論難盡未嘗留意於死生豈復稍論於椿菌儒學公子曰洙泗遺文鄒魯餘烈其道未迷其風不絶方領圜冠金口木舌談章句之逺旨搆紛綸之雅説陳五禮明六詩貫穿微妙辨析毫釐既待問於重席亦覃思而下帷醖藉豈弟和樂緝熙生徒肅肅賔友師師並接迹以聞道俱援手而授辭心絶內戰事無外欲橫經者比肩擁篲者繼足醜申韓之法令陋桓文之風俗六郡湊其衣冠五陵窮其軌躅信斯文其若水實斯人之如玉若夫珠璣産於蚌蛤圭璧出於山淵未有玉不瑩而為寶人不學而稱賢蓋持身之管籥進德之舟船響如鐘而待叩明似鏡以長懸此見重於經術寧降志於吾賢先生曰誠此言之甚美此道之為曠恥見嘲於腐儒豈求珍於席上治化公子曰我大梁之啓基方邃古而無匹則先天定始比殷商而餘裕揖讓受終考唐虞而不失道德有序憲章咸秩六府孔修百司盡畢搜求儒雅招拾遺逸昃食思治雖聞之於昔談昧旦臨朝乃見之乎兹日蕩蕩薰風泱泱大典道含洪而廣被澤汪濊而傍闡採輿人之片言納匹夫之小善事在微而必照物無幽而不顯若夫下車布德伐罪弔民風無偃稼雨不破塵覩勝殘於期月見成俗於浹辰含羣生兮若海養萬類兮猶春鄉無豕食之𨽻野靡狼顧之民樵者目金以知恥耕者讓畔以成仁何大庭之足競豈栗陸之能鄰璧水道庠序之風石渠啓圭璋之盛竒士輻輳而騁足異人間出而效命小大之獄無寃民翻飛之物無夭性故能睦之以九世齊之以七政坦坦恢恢巍巍赫赫政德被於霜風教義窮於足迹望雲氣而款關候海水而重譯所謂府不輟貢吏無虛帛天瑞磊砢而相尋地符氛氲而不少收六穗於征賦玩九莖於池沼三足應感而來儀一角知時而自擾映景星於初蓂聆鳳音於將曉若乃亭毒坱圠合天地而並施陶鈞日月與造化而齊功故非言辭之可盡筆札之能窮懷真獨往之夫奔走而從事滅迹藏名之士顛倒而向風二漢有同於兒戲魏晉無礙於胸中言未畢先生攝衣而起曰子前所説似玉巵之無當徒費辭而難領譬猶背日而視秋毫卻行而求鄢郢一聞皇王之盛豁然神悟而理攄志無時而可卷邦有道而宜舒敢以淺智請從後車此梁水部何仲言集也自仲言以詩名而張文昌輩繼起於是例作水曹遂為詩家故實然夷考古詩自謝朓一變已有唐風延至于今近體歌行盈天下而五言幾廢矣間有作者類詆齊梁不知其又出齊梁下也齊梁舍文選外隂何徐庾最著余友臨江龔師顔嘗評四家以何為上庾次之徐隂又次之蓋出雄渾於婉麗仲言猶為近古也何詩舊與隂偕刻余謂二家體裁各出不當比而同之公暇獨取是集芟其繁蕪録藏焉同寅毗陵陸懋之永嘉李升之咸以為然因共捐俸刻置郎署中有闕誤則因之而不敢益或者見雲林子亟稱仲言遂拈隂句若以抗之要之自有定價非徇獨見者所能了也正德丁丑孟冬雲間張紘跋何水部集
