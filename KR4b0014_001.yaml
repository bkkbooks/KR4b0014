body:
  text: 何水部集梁何遜撰行經孫氏陵昔在零陵厭神器若無依逐兔爭先捷掎鹿競因機呼吸開伯道叱吒掩江畿豹變分竒略虎視肅戎威長蛇衄巴漢驥馬絶淮淝交戰無內禦重門豈外扉成功舉已棄凶德愎而違水龍忽東騖青蓋乃西歸朅來已永久年代曖微微苔石疑文字荆墳失是非山鶯空曙響隴月自秋暉銀海終無浪金鳬會不飛閴寂今如此望望沾人衣登石頭城關城乃形勢地險差非一馬嶺逐紆回犬牙傍隆窣百雉極襟帶億庾兼量出至理歸無為善守竟何恤眺聽窮耳目逺近備幽悉擾擾見行人暉暉視落日連檣入回浦飛蓋交長術天暮逺山青潮去遙沙出薄宦恧師表屬辭慙愈疾願乘觳觫牛還隱蒙蘢室九日侍宴皇德無餘讓重規入帝勛垂衣封比屋眷顧慎為君翾飛悅有道卉木荷平分宸襟動時豫嵗序屬涼氛城霞旦晃朗槐靄晚絪緼鸞輿和六龍鳳駕啓千羣羽觴歡湛露佾舞奏承雲禁林終宴晚華池物色曛疏樹翻髙葉寒流聚細紋晴軒連瑞氣同惹御香芬日斜迢遞宇風起嵯峨雲運偶參侯服恩洽厠朝文於焉藉多幸嵗莫仰遊汾哭吳興柳惲南荆擅荆梓上國稱羽儀伊人以戴德李公傷在期逺識內無愠深衷外有窺清文窮麗則𢎞論盡髙竒多能誠所貴小善聊復為百步均射葉八體妙臨池曲悟同神解龜謀信有知入朝耿長劍出牧盛層麾納言信加首豐貂亦在移霞區兩借冦貪泉一舉巵翰飛矯未極朝露溘先危以兹舊館想况乃西日垂蔓草生車轍枯木臥崩坻樽酒誰為滿靈衣空自披眷言尋惠好慟哭悲路岐含毫徒有屬搦管竟無摛贈族人秣陵兄弟吾宗昔多士文雅高縉紳小子無學術丁寧困負薪傍枝實紛亂領袖寄親姻名價齊兩許閨門比三陳風力咸通邁藝業並紛綸元方振高羽落令初解巾自爾典名郡所在號清淳齊兒敢為俗蜀物豈隨身祿俸不妻子謳吟乃吏民孰云穢明德惟在中聖人若能遺酌我稱首當屬仁仲將本特達坎壈猶賤貧方成天下士豈伊席上珍外情或簡易內鑒甚人倫時然臨下邑摘伏信如神顧余晚脫略懷抱日湮淪遊宦疲年事來往厭江濵十載猶先職一官乃任真土牛竟不進芻狗空重陳羈旅無儔匹形影自相親蕭索高秋暮砧杵鳴四鄰霏霏入窗雨漠漠暗牀塵所思不可見邈若胡與秦願子加餐飯良會在何辰贈江長史别二紀歷兹辰投分敦遊處况事兼年德宴交無爾汝中嵗多乖違由來難具敘及吾相藩牧伊子客梁楚出國乃參差會歸同處所以兹篤惠好可用忘羈旅重得申平生何年更暌阻籠禽恨局促逸翮超容與餞道出郊坰把袂臨洲渚長飈落江樹秋月照沙溆逺送子應歸棹開帆欲舉離舟歡未極别至悲無語安得生羽毛從君入宛許落日前墟望贈范廣州雲緣溝緑草蔓扶援樵華舒輕煙淡柳色重霞映日餘遙遙長路逺寂寂行人踈我心懷碩德思欲命輕車高門盛遊侣誰肯進畋魚胡興安夜别居人行轉軾客子暫維舟念此一筵笑分為兩地愁露濕寒塘草月映清淮流方抱新離恨獨守故園秋行經范僕射故宅旅葵應蔓井荒藤已上扉寂寂空郊莫無復車馬歸瀲灧故池水蒼茫落日暉遺愛終何極行路獨沾衣入東經諸暨縣下浙江作疲身不自量溫腹無恆擬未能守封植何能固廉恥一經可人言三冬徒戲爾虛信蒼蒼色未究冥冥理得彼既宜然失之良有以常言厭四壁自覺輕千里日夕聊望逺山川空信美歸飛天際沒雲霧江旁起安邑乏主人臨卭多客子鄉鄉自風俗處處皆城市所見無故人含意終何已日夕出富陽浦口和朗公客心愁日莫徙倚空望歸山煙涵樹色江水映霞暉獨鶴凌空逝雙鳬出浪飛故鄉千餘里兹夕寒無衣塘邊見古塜行墳塘一孤路成墳欲毁空疑年代積不知陵谷徙幾逢秋葉黃驟見春流瀰金蠶不可織玉樹何時蕊陌上驅馳人笑歌自侈靡今日非明日所念誰憐此下方山寒鳥樹間響落星川際浮繁霜白曉岸苦霧黑晨流鱗鱗逆去水瀰瀰急還舟望鄉行復立瞻途更近修誰能百里地縈繞千端愁秋夕仰贈從兄置南階蕙漸翻葉池蓮稍罷花高樹北風響空庭秋月華寸心懷是夜寂寂漏方賖撫絃乏歡娛臨觴獨歎嗟悽愴戶涼入徘徊櫩影斜無為淹戚里見就還田家酬范記室雲林密户稍隂草滋階欲暗風光蕊上輕日色花中亂相思不獨歡佇立空為嘆清談莫共理繁文徒可玩高唱子自輕繼音豫可憚仰贈從兄興寧置南家世傳儒雅真白仰餘徽宗派已孤狹財産又貧微栖息同蝸舍出入共荆扉松筆時臨沼蒲簡得垂帷幸逢四海泰日月耀增輝相顧無羽翮何由總奮飛一朝異言宴萬里就暌違逺江飄素沫高山鬱翠微相思對渺渺相望隔巍巍死灰終不然長岑且未歸當憐此分袂脈脈淚沾衣見征人分别凄凄日暮時親賔俱佇立征人拔劍起兒女牽衣泣候騎出蕭關追兵赴馬邑且當橫行去誰論裹尸入劉博士江丞朱從事同顧不值作詩云爾故人篤久要新知從暮室﨑嶇枉道過邂逅幽人出心期不會面懷之成首疾向夕敞山扉臨窗玩餘帙蜘蛛正網户落花紛入膝浸淫水上風蔽虧霞中日良辰一擕手住坐無儔匹劉侯務屬書江生勤下筆朱君博辭理去去追名實是顧一參差何能更蓬蓽吾人少拘礙得性便遊逸方欲俟褰裳相從歡道術贈王左丞僧儒櫩外鶯啼罷園裏日光斜遊魚亂水葉輕燕逐風花長墟上寒靄曉樹沒歸霞九華暮已隱抱鬱徒交加七夕仙車駐七襄鳳駕出天潢月映九微火風吹百和香來歡暫巧笑還淚已沾粧依稀如洛汭倐忽似高唐别離未得語河漢漸湯湯與蘇九德别宿昔夢顔色咫尺思言偃何况杳來期各在天一面踟躇暫舉酒倐忽不相見春草似青袍秋月如團扇三五出重雲當知我憶君萋萋若被徑懷抱不相聞答高博士北窗涼夏首幽居多卉木飛蝶弄晚花清池映疏竹為宴得快性安間聊鼓腹將子厭囂塵就豫開耳目學古贈丘永嘉征還龍馬魚腸劍躞蹀起風塵結客蔥河返喧喧動四鄰入墟猶憶舊德卷復疑新窺見應門出遙識下機人相悲淚欲下離别方自陳送韋司馬别送别臨曲渚征人慕前侣離言雖欲繁離思終無緒憫憫分手畢蕭蕭行帆舉舉舉越中流望别上高樓豫起南枝怨子結北風愁邐邐山蔽日洶洶浪隱舟隱舟邈已逺徘徊落日晚歸衢並駕奔别館空筵卷相子斂眉去知豫銜淚返銜淚心依依薄暮征人稀曖曖入塘港蓬門已掩扉簾中看月影竹裡見螢飛螢飛飛不息獨愁空轉側北窗倒長簟南鄰夜聞織棄置勿復陳重陳長嘆息學古三首長安美少年羽騎暮連翩玉羈碼瑙勒金絡珊瑚鞭陳雲橫塞起赤日下城圓追兵待都護烽火望祁連虎落夜方寢魚麗晚復前平生不可念空信蒼浪天又鞏落上東門薄暮川流側渾渾車馬道行人不相識日夕棲鳥逺浮雲起新色寸心空延佇對面何由即飛輪倘易去易去因風力又昔隨張博望辭帝長楊宫獨好西山勇思為北地雄十年事河外雪鬢别關中季月邊秋重嚴野散寒蓬日隱龍城霧塵起玉關風全狐君已復半菽我猶空欲因上林鴈一見平陵桐王尚書瞻祖日昱昱丹旐振亭亭素蓋立金鐸歡已鳴龍輀將復入華臺日未徙荒墳路行濕已矣將何如賔馭皆灑泣詠舞管清羅薦合絃歌雪袖遲逐唱回纎手聽曲動蛾眉凝情盼墮珥微睇託含辭日暮留嘉客相看愛此時從主移西州寓直齋內霖雨不晴懷郡中遊聚寓直慚虎賁沉迷豈職事祈祈寒枝動濛濛秋雨駛不見眼中人空想山南寺雙桐傍櫩上長楊夾門植夙昔搆良遊接膝同歡志東西忽為阻向隅懷獨思颯颯履聲喧擾擾郡分異臥聞復雷響坐視重扃祕欲寄一行書何解三秋意苦熱昔聞草木焦今窺沙石爛曀曀風逾靜曈曈日漸旰習靜閟衣巾讀書煩几案臥思清露浥坐待高星燦蝙蝠户中飛蠛蠓窗間亂實無河朔飲空有臨淄汗遺金不自拾惡木寧無幹願以三伏晨催促九秋換西州直示同員日長禁戶倦即事思短晨漏盡唱聲急此理復傷人矛盾交為論光璧帶成珍誓將收飲啄得得任心神擬輕薄篇城東美少年重身輕萬億柘彈隋珠丸白馬黃金飾長安九逵上青槐蔭道植轂擊晨已喧肩排暝不息走狗通西望牽牛亘南直相期百戲傍去來三市側象牀沓繡被玉盤傳綺食倡女掩歌扇小婦開簾織相看獨隱笑見人還斂色黃鵠悲故羣山川詠新識鳥飛過客盡雀聚行龍匿酌羽方厭厭此時歡未極聊作百一體靈轍困桑下於陵拾李螬歷齒方嗟賤炙背豈知豪傭耕乏膂力倚市憚劬勞曠日無豆飯方冬缺緼袍清旦開蓬蓽舉目想煎熬樞機慎僕𨽻媒蘖畏朋曹萬途皆自僻一事豈他褒匆匆昨不定負杖出蓬蒿逢施同溝壑值設乃粳糟生途稍冉冉逝水日淹淹咸言等木石誰當出羽毛看伏郎新婚霧夕蓮出水霞朝日照梁何如花燭夜輕扇掩紅粧良人復灼灼席上自生光所悲高駕動環珮出長廊野夕答孫擢郎山中氣色滿墟上孤煙露杳杳星出雲啾啾雀隱樹虛館無賔客幽居乏歡趣思君意不窮長如流水注下直出溪邊望答虞丹徒敬夫君美章句席丈珍梁楚伊余忝攝官含毫亦禁阻直廬去咫尺心期得宴語休沐乃幽栖别離未幾許佇立日將暮相思忽無緒溪比映初星橋南望行炬九重不可越三爵何由舉和司馬博士詠雪凝階夜似月拂樹晚疑春蕭散忽如晝徘徊已復新暫蔽卷紈質復慚施粉人若逐微風起誰言非玉塵石頭答庾郎丹高樹蔭樓密細草緑成被黃鸝隱葉飛蛺蝶縈空戲隂岑日爾悅寂寥豫罕寄相如阻禁闈何由從簡易詠娼婦曖曖高樓暮華燭帳前明羅帷雀叉影寶瑟鳳雛聲庭花枝上發新月霧中生誰念當窗牖相望獨盈盈登禪岡寺望和虞記室南望南郭門拱樹梢雲密北窗北湊道重樓霧中出接樹隱高蟬交枝承落日光隂不可捨懷抱何由悉車中見新林分别甚盛金谷寶遊盛青門冠蓋多隔林望行幰下阪聽鳴珂於時春未歇麥氣始清和還入平原徑窮巷可張羅同虞記室諸人詠扇如圭信非點學月但為輪機杼蘼蕪妾裁縫篋笥人搖風入素手占曲掩朱唇羅袖幸拂拭微芳聊可因同虞記室登樓逺歸登樓欲望逺遙遙見白衣白衣猶逺逺言是稍知非對窗看寶瑟入戶弄鳴機無令日光晚門閣掩重扉臨行與故遊夜别歷稔共追隨一旦辭羣匹復如東注水未有西歸日夜雨滴空階曉燈暗離室相悲各罷酒何時同促膝照鏡朱簾旦初卷綺機晨未織玉匣開鑑影寶臺靜臨飾對影獨含笑看花時轉側聊為半繭眉試染夭桃色寶叉若何間金鈿長相逼蕩子行未歸啼粧坐沾臆初發新林伊昔負薪暇慕義遊梁楚短翮忘連翩追飛羡容與優遊沐道教漸漬淹寒暑大德本無酬輕生竊自許舟歸屬海運風積如鵬舉浮水暗舟艫合岸喧徒侣凜凛窮秋暮初寒入洲渚鐃吹響清江懸旗出長嶼危檣逈不進沓浪高難拒回首泣親賔中天望宛許帝城猶隱約家園無處所去矣方悠悠含意將何語夜夢故人客心驚夜魂言與故人同開簾覺水動映竹見牀空浦口望斜月洲外聞長風九秋時未晚千里路難窮已如擁腫木復似飄颻蓬相思不可寄直在寸心中别沈助教可憐玉匣劍復此飛鳬舄未覺愛生憎忽見雙成隻一朝别笑語萬事成疇昔道遒若波瀾人生異金石願君深自愛共念悲無益渡連圻北山多靈異峻岨實非恆洑流自回糾激瀨視奔騰懸崖抱竒崛絶壁駕崚嶒硣碌上爭險岞崿下相崩百年積死樹千尺挂寒藤詭怪終不測回沈意難登願欲書聞見聊以寄親朋宿南洲浦幽棲多暇豫從役知辛苦解纜及朝風落帆依暝浦違鄉已信次江月初三五沈沈夜看流淵淵朝聽鼓霜洲度旅鴈朔飈吹宿莽夜淚坐淫淫是夕偏懷土望星月示同羈初宿長淮上破鏡出雲明今夕千餘里雙蛾映水生的的與沙靜灧灧逐波輕望鄉皆下淚非我